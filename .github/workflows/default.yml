---
name: Default Pipeline

on:
  pull_request:
  push:
    branches:
      - "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-examples:
    name: Build example
    runs-on: ubuntu-24.04 # Use Ubuntu 24.04 explicitly
    strategy:
      fail-fast: true
      matrix:
        example:
          [
            angular-example,
            react-example,
            vue-example,
          ]
    steps:
      - name: ⬇ Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
  
      - name: 🆙 Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: 📥 Download deps
        uses: bahmutov/npm-install@20216767ca67f0f7b4d095dc5859c5700a6581cb # v1.12.1
        with:
          working-directory: ./${{ matrix.example }}

      - name: 🚋 Get working directory
        working-directory: ./${{ matrix.example }}
        run: npm run build

      - name: ⬆ Upload build
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ matrix.example }}
          path: ./build/${{ matrix.example }}

  test-examples:
    name: 🧪 with 🎭
    runs-on: ubuntu-24.04 # Use Ubuntu 24.04 explicitly
    needs: [build-examples]
    container:
      image: mcr.microsoft.com/playwright:v1.50.1
    steps:
      - name: ⬇ Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: ⬇ Download build angular
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: angular-example
          path: ./build/angular-example

      - name: ⬇ Download build react
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: react-example
          path: ./build/react-example

      - name: ⬇ Download build vue
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vue-example
          path: ./build/vue-example

      - name: 📥 Download deps
        uses: bahmutov/npm-install@20216767ca67f0f7b4d095dc5859c5700a6581cb # v1.12.1
        with:
          working-directory: ./e2e
          install-command: npm ci --ignore-scripts

      - name: 📲 Install esbuild (binary workaround)
        working-directory: ./e2e
        run: npm i -D esbuild-linux-64

      - name: 👩‍🔬 Test with Playwright 🎭
        working-directory: ./e2e
        env:
          HOME: /root
        run: npm run test

      - name: 🆙 Upload playwright-report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-report
          path: ./e2e/playwright-report
          retention-days: 30

      - name: 🆙 Upload test results
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-results
          path: ./e2e/test-results
          retention-days: 30
